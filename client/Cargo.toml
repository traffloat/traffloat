[package]
name = "traffloat-client"
description = "traffloat frontend client"
version.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
rust-version.workspace = true
edition.workspace = true

[lints]
workspace = true

[dependencies]
bevy_mod_config = { version = "0.6.1", features = ["egui"] }
egui = "0.33.1"
egui_dock = "0.18.0"
strum = { version = "0.28.0", features = ["derive"] }
tracing = "0.1.44"

traffloat-physics = { workspace = true }
traffloat-proto = { workspace = true }

[dependencies.bevy]
workspace = true
features = ["2d"]

[dependencies.bevy_egui]
version = "0.39.1"
default-features = false
features = ["default_fonts", "manage_clipboard", "open_url", "render", "serde"]

[features]
dev = [
    "bevy/dynamic_linking",
    "bevy/trace",
    "bevy/track_location",
]
