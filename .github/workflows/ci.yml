name: CI
on:
  push:
    branches:
      - "**"
      - "!dependabot/**"
    tags: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  fmt:
    name: rustfmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          profile: default
          default: true
          components: rustfmt
      - run: cargo fmt --all -- --check
  lint:
    name: clippy lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
        stability:
          - ""
          - "--release"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{matrix.toolchain}}
          profile: default
          default: true
          components: clippy
      - uses: actions/cache@v2
        with:
          path: |
            /home/runner/.cargo
            **/target
          key: ${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo clippy
        uses: actions-rs/clippy-check@v1
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          args: --all ${{matrix.stability}}
          name: debug${{matrix.stability}}
  test:
    name: unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
        stability:
          - ""
          - "--release"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{matrix.toolchain}}
          profile: default
          default: true
      - uses: actions/cache@v2
        with:
          path: |
            /home/runner/.cargo
            **/target
          key: ${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo test
        run: "cargo test --all ${{matrix.stability}}"
